name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  node-quality:
    name: Node Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: API tests
        run: npm run test:api

      - name: Ops tests
        run: npm run test:ops

  orchestrator-tests:
    name: Orchestrator Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install orchestrator dependencies
        run: python -m pip install -r backend/orchestrator/requirements.txt

      - name: Run orchestrator tests
        run: python -m unittest discover -s backend/orchestrator/tests -p "test_*.py" -v
